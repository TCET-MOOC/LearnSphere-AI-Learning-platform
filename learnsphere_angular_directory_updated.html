  .filter-btn.active { background: #534AB7; border-color: #534AB7; color: #fff; }
  .filter-btn:hover:not(.active) { border-color: var(--color-border-primary); color: var(--color-text-primary); }
  .search-box {
    padding: 5px 10px; border-radius: 6px; border: 1px solid var(--color-border-tertiary);

  .leg-dot { width: 8px; height: 8px; border-radius: 50%; }
  .tree { background: var(--color-background-secondary); border: 1px solid var(--color-border-tertiary); border-radius: 8px; padding: 12px 16px; overflow-x: auto; }
  .node-row { display: flex; align-items: flex-start; line-height: 1.75; font-size: 12.5px; color: var(--color-text-primary); cursor: pointer; border-radius: 4px; padding: 1px 4px; transition: background .1s; }
  .node-row:hover { background: var(--color-background-tertiary); }
  .node-row.hidden { display: none; }
  .indent { white-space: pre; color: var(--color-border-secondary); font-size: 12px; user-select: none; }
  .toggle { color: var(--color-text-tertiary); width: 14px; display: inline-block; user-select: none; font-size: 10px; }
  .node-icon { margin-right: 4px; font-size: 12px; }
  .node-name { }

  .node-name.file-ts { color: #1D9E75; }
  .node-name.file-html { color: #BA7517; }
  .node-name.file-scss { color: #D85A30; }
  .node-name.file-json { color: #185FA5; }
  .node-name.file-env { color: #993556; }
  .node-name.file-other { color: var(--color-text-secondary); }
  .node-route { margin-left: 8px; font-size: 10px; font-family: var(--font-mono); color: var(--color-text-tertiary); }
  .node-tag { margin-left: 6px; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-family: var(--font-sans); white-space: nowrap; }
  .tag-student { background: #EEEDFE; color: #3C3489; }
  .tag-teacher { background: #E1F5EE; color: #085041; }
  .tag-admin { background: #FAEEDA; color: #633806; }
  .tag-shared { background: #F1EFE8; color: #444441; }
  .tag-core { background: #FAECE7; color: #4A1B0C; }
  .tooltip-box {
    position: fixed; z-index: 999; background: var(--color-background-primary);
    border: 1px solid var(--color-border-secondary); border-radius: 8px; padding: 10px 12px;

<div class="container">

const TAG_COLORS = { student:'tag-student', teacher:'tag-teacher', admin:'tag-admin', shared:'tag-shared', core:'tag-core' };
const FILE_CLASS = { ts:'file-ts', html:'file-html', scss:'file-scss', json:'file-json', env:'file-env', other:'file-other', folder:'folder' };
const FILE_ICON = { ts:'🟢', html:'🟠', scss:'🔴', json:'🔵', env:'🔑', other:'📄', folder:'' };

let openNodes = new Set(), allRows = [], currentRole = 'all', searchQuery = '';

function flattenTree(nodes, depth, prefix) {
  nodes.forEach((node, idx) => {
    const isLast = idx === nodes.length - 1;
    const connector = depth === 0 ? '' : (isLast ? '└─ ' : '├─ ');
    const childPrefix = depth === 0 ? '' : prefix + (isLast ? '   ' : '│  ');
    const id = Math.random().toString(36).slice(2);
    node._id = id; node._depth = depth; node._prefix = prefix + connector;
    node._hasChildren = !!(node.children && node.children.length);
    if (node._hasChildren) openNodes.add(id);
    allRows.push(node);
    if (node.children) flattenTree(node.children, depth + 1, childPrefix);
  });
}

function matchesSearch(n) { return !searchQuery || n.n.toLowerCase().includes(searchQuery) || (n.route && n.route.toLowerCase().includes(searchQuery)); }

function getAncestorIds() {
  const vis = new Set();
  allRows.forEach(n => {
    if (n.t !== 'folder' && matchesSearch(n)) {
      allRows.forEach(p => { if (p.t === 'folder' && n._prefix.startsWith(p._prefix)) vis.add(p._id); });
    }
  });
  return vis;
}

function renderTree() {
  const container = document.getElementById('tree');
  let html = '', count = 0;
  const ancestors = searchQuery ? getAncestorIds() : null;
  allRows.forEach(node => {
    const isOpen = openNodes.has(node._id);
    let hidden = false;
    if (searchQuery) {
      const matches = matchesSearch(node);
      const isAnc = ancestors && ancestors.has(node._id);
      if (!matches && !isAnc) hidden = true;
    }
    if (!hidden && currentRole !== 'all' && node.t !== 'folder') {
      const parent = findParentFolder(node);
      if (parent && parent.tag && parent.tag !== currentRole && !['shared','core'].includes(parent.tag)) hidden = true;
    }
    const nameClass = FILE_CLASS[node.t] || 'file-other';
    const icon = node.t === 'folder' ? (isOpen ? '📂' : '📁') : (FILE_ICON[node.t] || '📄');
    const tagHtml = node.tag ? `<span class="node-tag ${TAG_COLORS[node.tag]||''}">${node.tag}</span>` : '';
    const routeHtml = node.route ? `<span class="node-route">${node.route}</span>` : '';
    const toggleHtml = node._hasChildren ? `<span class="toggle">${isOpen ? '▾' : '▸'}</span>` : '<span class="toggle"></span>';
    const changedClass = node.changed ? ' changed' : '';
    html += `<div class="node-row${hidden?' hidden':''}${changedClass}" data-id="${node._id}" onclick="handleClick('${node._id}')" onmousemove="showTip(event,'${node._id}')" onmouseleave="hideTip()">
      <span class="indent">${node._prefix}</span>${toggleHtml}<span class="node-icon">${icon}</span><span class="node-name ${nameClass}">${node.n}</span>${routeHtml}${tagHtml}
    </div>`;
    if (!hidden) count++;
  });
  container.innerHTML = html;
  document.getElementById('stats').textContent = `${count} items visible`;
}

function findParentFolder(node) {
  const idx = allRows.indexOf(node);
  for (let i = idx - 1; i >= 0; i--) {
    if (allRows[i].t === 'folder' && node._prefix.startsWith(allRows[i]._prefix)) return allRows[i];
  }
  return null;
}

function handleClick(id) {
  const node = allRows.find(n => n._id === id);
  if (!node || !node._hasChildren) return;
  if (openNodes.has(id)) openNodes.delete(id); else openNodes.add(id);
  renderTree();
}

const tooltip = document.getElementById('tooltip');
function showTip(e, id) {
  const node = allRows.find(n => n._id === id);
  if (!node || (!node.info && !node.route)) { hideTip(); return; }
  const routeHtml = node.route ? `<span class="tip-route">${node.route}</span>` : '';
  tooltip.innerHTML = `<strong>${node.n}</strong>${routeHtml}${node.info || ''}`;
  tooltip.style.display = 'block';
  let x = e.clientX + 14, y = e.clientY - 10;
  if (x + 310 > window.innerWidth) x = e.clientX - 314;
  if (y + 120 > window.innerHeight) y = e.clientY - 90;
  tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px';
}
function hideTip() { tooltip.style.display = 'none'; }

function filterRole(role) {
  currentRole = role;
  document.querySelectorAll('.filter-btn').forEach(b => {
    const label = b.textContent.trim().toLowerCase();
    b.classList.toggle('active', label === role || (role === 'all' && label === 'all'));
  });
  if (role !== 'all') toggleAll(true);
  renderTree();
}

function doSearch(q) {
  searchQuery = q.toLowerCase().trim();
  if (searchQuery) toggleAll(true);
  renderTree();
}

function toggleAll(expand) {
  allRows.forEach(n => { if (n._hasChildren) { if (expand) openNodes.add(n._id); else openNodes.delete(n._id); } });
  renderTree();
}

flattenTree(T, 0, '');
toggleAll(false);
['learnsphere/','src/','app/','features/','core/','shared/','student/','teacher/','admin/','styles/','environments/'].forEach(name => {
  const n = allRows.find(x => x.n === name);
  if (n) openNodes.add(n._id);
});
