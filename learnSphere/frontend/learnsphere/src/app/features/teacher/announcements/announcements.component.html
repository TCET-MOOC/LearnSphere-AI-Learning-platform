<section class="portal-page"><header class="page-header"><div><div class="eyebrow">Teacher workspace</div><h1>Announcements</h1><p>Important news and updates from your LearnSphere community.</p></div></header>
<div class="feed-toolbar"><label class="search-control"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg><input [(ngModel)]="query" placeholder="Search announcements…"></label><div class="filters"><button *ngFor="let filter of filters" [class.active]="activeFilter === filter" (click)="activeFilter = filter">{{ filter }}</button></div></div>
<div class="feed-layout"><div class="feed-list"><article class="feed-card" *ngFor="let item of filteredItems"><div class="item-icon"><svg viewBox="0 0 24 24"><path d="M4 13V8l13-5v15L4 13Z"></path><path d="M7 14v5h4v-3"></path></svg></div><div class="feed-copy"><div class="feed-title-row"><h2>{{ item.title }}</h2><span class="pin" *ngIf="item.pinned">Pinned</span></div><p>{{ item.body }}</p><div class="feed-meta"><span>{{ item.category }}</span><span>{{ item.meta }}</span></div></div></article><div class="empty-state" *ngIf="!filteredItems.length">No matching announcements.</div></div><aside class="summary-card"><span class="summary-label">At a glance</span><strong>{{ items.length }}</strong><p>announcements this week</p><div class="summary-line"><span>Categories</span><b>{{ filters.length - 1 }}</b></div></aside></div></section>
