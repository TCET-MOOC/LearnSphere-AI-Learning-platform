<div class="dashboard-container">
  <div class="page-greeting">Welcome back, {{ teacherName }}</div>

  <div class="kpi-row">
    <div class="kpi-card" *ngFor="let card of kpiCards">
      <div class="kpi-lbl">{{ card.label }}</div>
      <div class="kpi-val">{{ card.value }}</div>
      <div class="kpi-sub" [style.color]="card.subColor">{{ card.sub }}</div>
    </div>
  </div>

  <div class="main-split">
    
    <div class="card my-courses-card">
      <div class="card-hd">
        My courses <span class="card-link">Manage all</span>
      </div>
      
      <div class="course-row" *ngFor="let course of myCourses">
        <div class="course-thumb" [style.background]="course.bg">{{ course.icon }}</div>
        <div class="course-info">
          <div class="course-title">{{ course.title }}</div>
          <div class="course-meta">{{ course.stats }}</div>
        </div>
        <span class="pill" [ngClass]="course.pillClass">{{ course.status }}</span>
      </div>
    </div>

    <div class="right-col">
      
      <div class="card">
        <div class="card-hd">
          Recent student messages <span class="card-link">Inbox</span>
        </div>
        
        <div class="msg-row" *ngFor="let msg of recentMessages">
          <div class="unread-dot"></div>
          <div class="msg-ava" [style.background]="msg.bg" [style.color]="msg.color">{{ msg.initials }}</div>
          <div class="msg-info">
            <div class="msg-name">{{ msg.name }}</div>
            <div class="msg-text">{{ msg.text }} · {{ msg.time }}</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-hd">Quick actions</div>
        <div class="action-grid">
          <button class="action-btn prim">Upload lecture</button>
          <button class="action-btn">Schedule session</button>
          <button class="action-btn">Add quiz</button>
          <button class="action-btn">Post announcement</button>
        </div>
      </div>

    </div>
  </div>
</div>
