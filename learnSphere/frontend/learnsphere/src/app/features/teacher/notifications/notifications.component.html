<section class="portal-page"><header class="page-header"><div><div class="eyebrow">Teacher workspace</div><h1>Notifications</h1><p>Your latest activity, reminders, and action items in one place.</p></div><button class="secondary-btn" *ngIf="unreadCount" (click)="markAllRead()">Mark all as read</button></header>
<div class="feed-toolbar"><label class="search-control"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg><input [(ngModel)]="query" placeholder="Search notifications…"></label><div class="filters"><button *ngFor="let filter of filters" [class.active]="activeFilter === filter" (click)="activeFilter = filter">{{ filter }}</button></div></div>
<div class="feed-layout"><div class="feed-list"><article class="feed-card" *ngFor="let item of filteredItems" [class.unread]="!readItems.has(item.id)" (click)="markRead(item.id)"><div class="item-icon"><svg viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0-6 6c0 5-2 7-2 7h16s-2-2-2-7a6 6 0 0 0-6-6Z"></path><path d="M10 20h4"></path></svg></div><div class="feed-copy"><div class="feed-title-row"><h2>{{ item.title }}</h2></div><p>{{ item.body }}</p><div class="feed-meta"><span>{{ item.category }}</span><span>{{ item.meta }}</span></div></div><span class="unread-dot" *ngIf="!readItems.has(item.id)"></span></article><div class="empty-state" *ngIf="!filteredItems.length">No matching notifications.</div></div><aside class="summary-card"><span class="summary-label">At a glance</span><strong>{{ items.length }}</strong><p>notifications this week</p><div class="summary-line"><span>Unread</span><b>{{ unreadCount }}</b></div></aside></div></section>
