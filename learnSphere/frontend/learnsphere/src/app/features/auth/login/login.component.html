<div class="auth-layout">
  <div class="auth-card">
    <div class="brand">
      <div class="logo-box">LS</div>
      <h2>Welcome back</h2>
      <p>Please enter your details to sign in.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      
      <div class="form-group">
        <label for="role">Login As</label>
        <select id="role" formControlName="role" class="custom-select">
          <option *ngFor="let role of roles" [value]="role.value">
            {{ role.label }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="email">College Email</label>
        <input type="email" id="email" formControlName="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" placeholder="••••••••" />
      </div>

      <div class="form-actions">
        <label class="remember-me">
          <input type="checkbox" /> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loginForm.invalid">Sign In</button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register">Sign up</a></p>
    </div>
  </div>
</div>
